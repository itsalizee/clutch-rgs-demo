<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Ascent Cross — provably-fair crossing</title>
<link rel="stylesheet" href="/shared/clutch.css" />
<style>
  :root{ --accent1:#22D3EE; --accent2:#8B3FFF; }
  .status{font-family:var(--mono);font-size:11px;color:var(--muted);margin:6px 2px 0;min-height:14px}
  .diffs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .diff{flex:1;min-width:120px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:13px;padding:9px 12px;cursor:pointer;transition:.15s;text-align:left}
  .diff:hover{background:rgba(255,255,255,.09)} .diff.sel{border-color:var(--accent1);background:rgba(34,211,238,.12);box-shadow:0 0 16px rgba(34,211,238,.2)}
  .diff .n{font-weight:700;font-size:14px} .diff .m{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
  .river{position:relative;border-radius:20px;overflow:hidden;height:300px;margin-top:12px;background:
    radial-gradient(1px 1px at 12% 22%,#fff,transparent),radial-gradient(1px 1px at 68% 30%,#aef,transparent),
    radial-gradient(1px 1px at 38% 72%,#fce,transparent),radial-gradient(1px 1px at 85% 60%,#fff,transparent),
    radial-gradient(1px 1px at 24% 50%,#cdf,transparent),radial-gradient(1px 1px at 55% 14%,#fff,transparent),
    radial-gradient(circle at 25% 12%,rgba(139,63,255,.32),transparent 50%),radial-gradient(circle at 82% 88%,rgba(34,211,238,.22),transparent 50%),
    linear-gradient(180deg,#0c0826,#070414);box-shadow:inset 0 0 60px rgba(0,0,0,.55),0 16px 50px rgba(0,0,0,.5);border:1px solid var(--line)}
  .track{position:absolute;top:0;left:0;height:100%;display:flex;align-items:center;padding:0 30px;transition:transform .45s cubic-bezier(.22,1,.36,1)}
  .pad{flex:0 0 110px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
  .pad .stone{width:78px;height:78px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;background:radial-gradient(circle at 35% 30%,#3a3550,#15121f);border:2px solid rgba(124,92,255,.45);box-shadow:0 6px 16px rgba(0,0,0,.5),inset 0 0 14px rgba(124,92,255,.25);transition:.2s}
  .pad.bank .stone{background:radial-gradient(circle at 35% 30%,#243a4f,#0c1622);border-color:rgba(34,211,238,.45)}
  .pad.passed .stone{border-color:var(--green);box-shadow:0 0 18px rgba(43,255,136,.4)} .pad.current .stone{transform:scale(1.12);border-color:var(--accent1);box-shadow:0 0 26px rgba(34,211,238,.6)}
  .pad.hazard .stone{background:radial-gradient(circle at 35% 30%,#5b1020,#2a0810);border-color:var(--rug);box-shadow:0 0 26px rgba(255,54,83,.6)}
  .pad .mult{font-family:var(--mono);font-size:13px;font-weight:700;margin-top:8px;color:var(--muted)} .pad.passed .mult{color:var(--green)}.pad.current .mult{color:var(--accent1)}
  .frog{position:absolute;top:104px;font-size:34px;transition:.45s cubic-bezier(.22,1,.36,1);filter:drop-shadow(0 6px 8px rgba(0,0,0,.6));z-index:3}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;text-align:center}
  .bigmult{font-weight:700;font-size:58px;line-height:1;text-shadow:0 0 22px currentColor;color:var(--accent1);opacity:0;transition:.2s}.bigmult.show{opacity:1}
  .toast{font-family:var(--mono);font-size:14px;margin-top:6px;color:#fff;opacity:0;transition:.2s}.toast.show{opacity:1}
  .splash{position:absolute;font-size:40px;opacity:0;transition:.3s;z-index:4}.splash.show{opacity:1;animation:pop .5s}
  @keyframes pop{0%{transform:scale(.4)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
  .cashout{font-family:var(--mono);font-size:12px;color:var(--gold)}
</style>
</head>
<body>
<div class="cs-app">
  <div class="cs-header">
    <div class="cs-logo">🚀 Ascent Cross</div>
    <div class="cs-bal"><div class="v"><span id="bal">—</span></div><div class="u">CREDITS</div></div>
  </div>
  <div class="cs-state" id="state">connecting…</div>
  <div class="status" id="status">connecting to the game server…</div>

  <div class="diffs" id="diffs"></div>

  <div class="river" id="river">
    <div class="track" id="track"></div>
    <div class="frog" id="frog" style="display:none">🧑‍🚀</div>
    <div class="splash" id="splash"></div>
    <div class="overlay"><div class="bigmult" id="bigmult">1.00×</div><div class="toast" id="toast"></div></div>
  </div>
  <div class="cs-fair" id="fair">provably fair · the meteor's lane is hidden server-side</div>

  <div class="cs-dock">
    <div class="cs-panel">
      <div class="cs-stakecol">
        <div class="cs-field"><div style="flex:1"><label>bet</label><input id="bet" type="number" value="10" min="1" step="1" inputmode="decimal"></div><span class="cashout" id="cashval">—</span></div>
        <div class="cs-chips"><button class="cs-chip" data-chip="10">+10</button><button class="cs-chip" data-chip="50">+50</button><button class="cs-chip" data-chip="half">½</button><button class="cs-chip" data-chip="dbl">2×</button></div>
      </div>
      <div class="cs-actioncol">
        <button class="cs-btn primary" id="btnBet" disabled>Launch &amp; climb 🚀</button>
        <div class="cs-row2"><button class="cs-btn go" id="btnHop" disabled>Hop ▶</button><button class="cs-btn cash" id="btnCash" disabled>Cash out</button></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
const $=(id)=>document.getElementById(id);
const RGS=new URLSearchParams(location.search).get("rgs")||`${location.protocol==="https:"?"wss":"ws"}://${location.host}/ws/cross`;
const MINOR=100; const fmt=(m)=>(m/MINOR).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const randHex=(n)=>{const b=new Uint8Array(n);crypto.getRandomValues(b);return [...b].map(x=>x.toString(16).padStart(2,"0")).join("")};
let ws,state="connecting",diffs={},sel="easy",run=null;
function setStatus(t){ $("status").textContent=t; }
function setState(t,c){ const el=$("state"); el.textContent=t; el.className="cs-state"+(c?" "+c:""); }
function buttons(){ const idle=state==="idle",running=state==="running";
  $("btnBet").disabled=!idle; $("btnHop").disabled=!running; $("btnCash").disabled=!(running&&run&&run.lane>=1); $("bet").disabled=!idle;
  [...document.querySelectorAll(".diff")].forEach(d=>d.style.pointerEvents=idle?"auto":"none"); }
function renderDiffs(){ const order=["easy","medium","hard","hardcore"];
  $("diffs").innerHTML=order.filter(k=>diffs[k]).map(k=>{ const c=diffs[k],edge=0.03; const s1=Math.floor((1-edge)/c.survival*100)/100;
    const max=Math.floor((1-edge)/Math.pow(c.survival,c.lanes)*100)/100; const ml=max>=1000?Math.round(max).toLocaleString()+"×":max.toFixed(2)+"×";
    return `<div class="diff ${k===sel?'sel':''}" data-k="${k}"><div class="n">${k[0].toUpperCase()+k.slice(1)}</div><div class="m">${c.lanes} lanes · ${s1}× → ${ml}</div></div>`; }).join("");
  [...document.querySelectorAll(".diff")].forEach(d=>d.onclick=()=>{ if(state!=="idle")return; sel=d.dataset.k; renderDiffs(); }); }
function buildTrack(){ const lanes=run.lanes,lad=run.ladder; let h=`<div class="pad bank"><div class="stone">🚀</div><div class="mult">launch</div></div>`;
  for(let i=1;i<=lanes;i++) h+=`<div class="pad" data-lane="${i}" id="pad${i}"><div class="stone"></div><div class="mult">${lad[i-1].toFixed(2)}×</div></div>`;
  h+=`<div class="pad bank"><div class="stone">🌟</div><div class="mult">the stars</div></div>`; $("track").innerHTML=h; $("frog").style.display="block"; positionFrog(0); }
function positionFrog(lane){ const padW=110,pad=30,x=pad+lane*padW+(padW-30)/2; $("frog").style.left=x+"px";
  const rw=$("river").clientWidth, shift=Math.max(0,(pad+lane*padW+padW/2)-rw/2); $("track").style.transform=`translateX(${-shift}px)`; $("frog").style.transform=`translateX(${-shift}px)`; }
function markPad(l,c){ const p=$("pad"+l); if(p){ p.classList.remove("current","passed","hazard"); p.classList.add(c);} }
function connect(){ ws=new WebSocket(RGS);
  ws.onopen=()=>ws.send(JSON.stringify({type:"hello",sessionToken:"cross-"+randHex(3),mode:"demo"}));
  ws.onclose=()=>{ setStatus("disconnected · reconnecting…"); setState("reconnecting…"); state="connecting"; buttons(); setTimeout(()=>{if(state==="connecting")connect();},1500); };
  ws.onerror=()=>setStatus("can't reach the game server"); ws.onmessage=(ev)=>handle(JSON.parse(ev.data)); }
function handle(m){ switch(m.type){
  case "welcome": diffs=m.difficulties; $("bal").textContent=fmt(m.balance); state="idle"; renderDiffs(); buttons(); setState("ready","is-idle"); setStatus("pick a difficulty, set your bet, and climb"); break;
  case "run_open": run={...m.run,lane:0}; $("bal").textContent=fmt(m.balance); state="running"; buildTrack(); buttons();
    $("bigmult").classList.remove("show"); $("toast").classList.remove("show"); $("splash").classList.remove("show"); $("bigmult").style.color=""; $("cashval").textContent="—";
    $("fair").innerHTML=`fair commit <b>${run.commitment.slice(0,16)}…</b>`; setState("climbing · "+run.difficulty,"is-live"); setStatus("hop to the next lane or cash out"); break;
  case "hop": run.lane=m.lane; markPad(m.lane,"current"); for(let i=1;i<m.lane;i++)markPad(i,"passed"); positionFrog(m.lane);
    $("bigmult").textContent=m.multiplier.toFixed(2)+"×"; $("bigmult").classList.add("show"); $("cashval").textContent="cash "+fmt(Math.floor(curStake()*m.multiplier)); buttons(); break;
  case "run_over":{ const r=m.reveal;
    if(m.status==="rugged"){ markPad(m.lane,"hazard"); const p=$("pad"+m.lane); if(p)p.querySelector(".stone").textContent="☄️"; positionFrog(m.lane); $("frog").textContent="💀";
      $("bigmult").textContent="LOST"; $("bigmult").style.color="var(--rug)"; $("bigmult").classList.add("show"); showSplash("💥"); $("toast").textContent=`meteor on lane ${m.lane}`; $("toast").classList.add("show"); setState("rugged","is-lose"); setStatus(`lost on lane ${m.lane} · void was ${r.failLane}`); }
    else { $("frog").textContent="🧑‍🚀"; $("bigmult").style.color="var(--green)"; $("bigmult").textContent="+"+fmt(m.payout); $("bigmult").classList.add("show"); showSplash("🎉"); $("toast").textContent=`cashed ${m.multiplier.toFixed(2)}× on lane ${m.lane}`; $("toast").classList.add("show"); setState("cashed "+m.multiplier.toFixed(2)+"×","is-win"); setStatus(`cashed out for ${fmt(m.payout)} credits`); }
    $("bal").textContent=fmt(m.balance); $("fair").innerHTML=`revealed <b>${r.serverSeed.slice(0,16)}…</b> · hazard lane <b>${r.failLane}</b> · SHA-256=commit <span class="ok">✓</span>`; $("frog").textContent="🧑‍🚀"; state="idle"; run=null; buttons(); break; }
  case "error": setStatus("⚠ "+m.message); if(state!=="running")state="idle"; buttons(); break; } }
function curStake(){ return Math.round(parseFloat($("bet").value||"0")*MINOR); }
function showSplash(e){ const s=$("splash"); s.textContent=e; s.classList.remove("show"); void s.offsetWidth; s.classList.add("show"); }
$("btnBet").onclick=()=>{ const s=curStake(); if(!(s>0))return setStatus("enter a bet"); ws.send(JSON.stringify({type:"open_run",stake:s,difficulty:sel,clientEntropy:randHex(16)})); state="betting"; buttons(); };
$("btnHop").onclick=()=>{ if(run)ws.send(JSON.stringify({type:"hop",runId:run.runId})); };
$("btnCash").onclick=()=>{ if(run)ws.send(JSON.stringify({type:"cash_out",runId:run.runId})); };
document.querySelectorAll(".cs-chip").forEach(b=>b.onclick=()=>{ const c=b.dataset.chip,v=parseFloat($("bet").value||"0"); if(c==="half")$("bet").value=Math.max(1,Math.floor(v/2)); else if(c==="dbl")$("bet").value=Math.max(1,Math.floor(v*2)); else $("bet").value=Math.floor(v+ +c); });
connect();
</script>
</body>
</html>
