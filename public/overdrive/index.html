<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Overdrive — provably-fair car-crash</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{ --red:#FF3B30;--orange:#FF7A18;--gold:#FFD23F;--teal:#22D3EE;--green:#2BFF88;--pink:#FF2E97;--rug:#FF3653;
    --text:#f4f7ff;--muted:#93a0ba;--glass:rgba(14,17,28,.66);--line:rgba(255,255,255,.12);
    --display:'Fredoka',system-ui,sans-serif;--mono:'Space Mono',monospace; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#04050a}
  body{font-family:var(--display);color:var(--text);-webkit-font-smoothing:antialiased;touch-action:manipulation}
  #wrap{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}
  .flash{position:absolute;inset:0;opacity:0;transition:opacity .12s;pointer-events:none;z-index:3;mix-blend-mode:screen}
  .hud{position:absolute;inset:0;pointer-events:none;z-index:5;display:flex;flex-direction:column}
  .vig{position:absolute;inset:0;pointer-events:none;z-index:2;background:radial-gradient(120% 80% at 50% 40%,transparent 55%,rgba(0,0,0,.55) 100%)}

  /* top bar */
  .top{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 16px 0}
  .brand{display:flex;flex-direction:column;gap:8px}
  .logo{font-weight:700;font-size:22px;letter-spacing:.5px;background:linear-gradient(90deg,var(--red),var(--orange) 55%,var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 12px rgba(255,122,24,.4))}
  .chip{align-self:flex-start;font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:999px;border:1px solid var(--line);background:var(--glass);color:var(--muted)}
  .chip.live{color:#04150c;background:linear-gradient(90deg,var(--green),var(--teal));border-color:transparent}
  .chip.bet{color:#1a0f02;background:linear-gradient(90deg,var(--gold),var(--orange));border-color:transparent}
  .chip.bust{color:#fff;background:var(--rug);border-color:transparent}
  .bal{text-align:right;font-family:var(--mono)}
  .bal .v{font-size:20px;color:#fff;text-shadow:0 2px 10px #000}.bal .u{font-size:10px;color:var(--gold);letter-spacing:1px}

  /* history pills */
  .hist{display:flex;gap:6px;padding:8px 16px 0;flex-wrap:wrap;max-width:70%}
  .pill{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted)}
  .pill.mid{color:#9ff0ff;border-color:rgba(34,211,238,.4)} .pill.hi{color:var(--gold);border-color:rgba(255,210,63,.5)} .pill.mega{color:var(--pink);border-color:rgba(255,46,151,.6)}

  /* multiplier — kept in the TOP third so it never covers the car */
  .center{position:absolute;top:11%;left:0;right:0;display:flex;flex-direction:column;align-items:center}
  .big{font-weight:700;font-size:10vw;line-height:.9;color:var(--gold);text-shadow:0 0 40px currentColor,0 6px 18px #000;transition:color .15s;letter-spacing:-.02em}
  .big.run{color:#fff}.big.bust{color:var(--rug)}
  .sub{font-family:var(--mono);font-size:13px;color:#dfe7f5;text-shadow:0 2px 8px #000;margin-top:4px;letter-spacing:.5px}

  /* speedometer */
  .speedo{position:absolute;right:20px;top:44%;text-align:center;font-family:var(--mono)}
  .speedo .n{font-size:34px;font-weight:700;color:#fff;text-shadow:0 0 16px rgba(34,211,238,.7),0 2px 8px #000}
  .speedo .u{font-size:10px;color:var(--teal);letter-spacing:2px}
  .fairbadge{position:absolute;left:16px;bottom:132px;font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.6);text-shadow:0 1px 4px #000}
  .fairbadge b{color:var(--teal)} .fairbadge .ok{color:var(--green)}

  /* dock */
  .dock{margin-top:auto;pointer-events:none;padding:0 12px 14px;display:flex;flex-direction:column;gap:8px;align-items:center}
  .count{width:min(680px,94%);height:5px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}
  .count>i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--orange));transition:width .1s linear}
  .panel{pointer-events:auto;width:min(680px,94%);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--line);border-radius:20px;padding:12px;display:grid;grid-template-columns:1fr 1.25fr;gap:10px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .stake{display:flex;flex-direction:column;gap:8px}
  .stakebox{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:8px 12px}
  .stakebox label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .stakebox input{background:transparent;border:none;color:#fff;font-family:var(--mono);font-weight:700;font-size:20px;width:100%;outline:none;min-width:0}
  .chips{display:flex;gap:6px}
  .chipbtn{flex:1;font-family:var(--mono);font-size:12px;color:var(--muted);background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:10px;padding:7px 0;cursor:pointer;text-align:center;transition:.1s}
  .chipbtn:hover{color:#fff;border-color:var(--teal)}
  .autobox{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:12px;padding:6px 10px}
  .autobox label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .autobox input{background:transparent;border:none;color:#fff;font-family:var(--mono);font-weight:700;font-size:15px;width:100%;outline:none;min-width:0}
  .action{display:flex;flex-direction:column;gap:8px}
  button.big-btn{flex:1;border:none;border-radius:16px;cursor:pointer;font-family:var(--display);font-weight:700;transition:.1s;color:#2a0a06;line-height:1.1}
  button.big-btn:active{transform:scale(.985)} button.big-btn:disabled{opacity:.38;cursor:not-allowed}
  .btn-bet{background:linear-gradient(135deg,var(--red),var(--orange));font-size:20px;min-height:56px}
  .btn-cash{background:linear-gradient(135deg,var(--gold),var(--green));color:#052113;font-size:17px;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .btn-cash small{font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:.5px}
  .btn-cash span{font-size:11px;opacity:.8;font-family:var(--mono);letter-spacing:1px}
  @media(max-width:560px){ .panel{grid-template-columns:1fr;gap:8px} .hist{max-width:100%} .big{font-size:22vw} }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div class="flash" id="flash"></div>
  <div class="vig"></div>
  <div class="hud">
    <div class="top">
      <div class="brand"><div class="logo">🏎️ OVERDRIVE</div><div class="chip" id="state">connecting…</div></div>
      <div class="bal"><div class="v"><span id="bal">—</span></div><div class="u">CREDITS</div></div>
    </div>
    <div class="hist" id="hist"></div>
    <div class="center"><div class="big" id="big">1.00×</div><div class="sub" id="sub">waiting for the next run…</div></div>
    <div class="speedo"><div class="n" id="spd">0</div><div class="u">KM/H</div></div>
    <div class="fairbadge" id="fair">DOWNTOWN · provably fair</div>
    <div class="dock">
      <div class="count"><i id="countbar"></i></div>
      <div class="panel">
        <div class="stake">
          <div class="stakebox"><div><label>bet</label><input id="bet" type="number" value="10" min="1" step="1" inputmode="decimal"></div></div>
          <div class="chips"><button class="chipbtn" data-chip="10">+10</button><button class="chipbtn" data-chip="50">+50</button><button class="chipbtn" data-chip="half">½</button><button class="chipbtn" data-chip="dbl">2×</button></div>
          <div class="autobox"><label>auto&nbsp;×</label><input id="auto" type="number" value="2.00" min="1.01" step="0.1" inputmode="decimal"></div>
        </div>
        <div class="action">
          <button class="big-btn btn-bet" id="btnBet" disabled>Floor it 🏎️</button>
          <button class="big-btn btn-cash" id="btnCash" disabled><small id="cashamt">Cash out</small><span id="cashsub">tap to bank</span></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from "three";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";
import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";
const $=(id)=>document.getElementById(id);

/* ================= 3D scene ================= */
const canvas=$("c");
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.15;
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x070912);
scene.fog=new THREE.FogExp2(0x0a0e1e, 0.0105);
const camera=new THREE.PerspectiveCamera(64, innerWidth/innerHeight, 0.1, 600);
camera.position.set(0,2.9,11); camera.lookAt(0,0.9,-10);

// procedural environment map — gives paint + wet road real reflections
const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;

scene.add(new THREE.AmbientLight(0x3a4a70,0.45));
const key=new THREE.DirectionalLight(0x9fc4ff,0.5); key.position.set(-8,16,6); scene.add(key);
scene.add(new THREE.HemisphereLight(0x2a3a66, 0x05060d, 0.35));

const ROADW=15, LEN=420;
// wet, near-mirror asphalt (reflects the env + neon)
const road=new THREE.Mesh(new THREE.PlaneGeometry(ROADW,LEN),new THREE.MeshStandardMaterial({color:0x070910,roughness:.12,metalness:.92,envMapIntensity:1.4}));
road.rotation.x=-Math.PI/2; road.position.z=-LEN/2+11; scene.add(road);
for(const s of [-1,1]){ const e=new THREE.Mesh(new THREE.PlaneGeometry(0.18,LEN),new THREE.MeshBasicMaterial({color:s<0?0x22d3ee:0xff2e97})); e.rotation.x=-Math.PI/2; e.position.set(s*ROADW/2,.02,-LEN/2+11); scene.add(e); }
for(const s of [-1,1]){ const sw=new THREE.Mesh(new THREE.PlaneGeometry(9,LEN),new THREE.MeshStandardMaterial({color:0x0b0e16,roughness:.5,metalness:.4,envMapIntensity:.7})); sw.rotation.x=-Math.PI/2; sw.position.set(s*(ROADW/2+4.5),0.008,-LEN/2+11); scene.add(sw); }
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(900,LEN),new THREE.MeshStandardMaterial({color:0x05060c,roughness:1})); gnd.rotation.x=-Math.PI/2; gnd.position.set(0,-.08,-LEN/2+11); scene.add(gnd);

const movers=[];
const dashGeo=new THREE.PlaneGeometry(0.34,3.6), dashMat=new THREE.MeshBasicMaterial({color:0xffe08a});
for(let i=0;i<34;i++){ const d=new THREE.Mesh(dashGeo,dashMat); d.rotation.x=-Math.PI/2; d.position.set(0,.035,-i*6); d.userData.wrap=-204; scene.add(d); movers.push(d); }

function windowTex(){ const c=document.createElement("canvas"); c.width=48;c.height=96; const g=c.getContext("2d");
  g.fillStyle="#04050b"; g.fillRect(0,0,48,96); const cols=["#8fd8ff","#ffd6a0","#ffffff","#bfe9ff","#ffcf6b","#a0f0d0"];
  for(let y=3;y<96;y+=6)for(let x=3;x<48;x+=7){ if(Math.random()<0.6){ g.fillStyle=cols[(Math.random()*cols.length)|0]; g.globalAlpha=.5+Math.random()*.5; g.fillRect(x,y,4,4);} }
  const t=new THREE.CanvasTexture(c); t.magFilter=THREE.NearestFilter; return t; }
const winTex=windowTex();
const signCols=[0x22d3ee,0xff2e97,0xff7a18,0x2bff88,0xffd23f,0x8b3fff];
function building(side,z,near){ const w=5+Math.random()*7,h=(near?20:36)+Math.random()*(near?24:66),d=5+Math.random()*7;
  const tex=winTex.clone(); tex.needsUpdate=true; tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(Math.max(2,Math.round(w/2.2)),Math.round(h/5));
  const x=side*(ROADW/2+4.5+Math.random()*(near?3:16));
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color:0x0b0f1c,emissive:0xffffff,emissiveMap:tex,emissiveIntensity:1.05,roughness:.55,metalness:.45,envMapIntensity:.8}));
  m.position.set(x,h/2-1,z); m.userData.wrap=-224; scene.add(m); movers.push(m);
  if(Math.random()<0.4){ const sc=signCols[(Math.random()*signCols.length)|0]; const sh=1.5+Math.random()*3;
    const sg=new THREE.Mesh(new THREE.PlaneGeometry(w*0.7,sh),new THREE.MeshBasicMaterial({color:sc})); sg.position.set(x-side*(d/2+0.06),4+Math.random()*Math.max(1,h-8),z); sg.rotation.y=side>0?-Math.PI/2:Math.PI/2; sg.userData.wrap=-224; scene.add(sg); movers.push(sg); } }
for(let i=0;i<30;i++){ building(-1,-i*11-6,true); building(1,-i*11-11,true); building(-1,-i*13-4,false); building(1,-i*13-9,false); }
const poleGeo=new THREE.BoxGeometry(.16,6,.16);
for(let i=0;i<26;i++)for(const s of [-1,1]){ const p=new THREE.Mesh(poleGeo,new THREE.MeshBasicMaterial({color:s<0?0x22d3ee:0xff2e97})); p.position.set(s*(ROADW/2+.6),3,-i*13); p.userData.wrap=-208; scene.add(p); movers.push(p); }

/* car (rear view) — reflective clearcoat paint + glass */
const car=new THREE.Group(); car.scale.setScalar(1.55); car.position.set(0,0,1.4);
const paint=new THREE.MeshPhysicalMaterial({color:0xffe11a,roughness:.24,metalness:.75,clearcoat:1,clearcoatRoughness:.12,envMapIntensity:1.5});
const lower=new THREE.Mesh(new THREE.BoxGeometry(2.12,0.42,4.1),new THREE.MeshStandardMaterial({color:0x0e1014,roughness:.5,metalness:.6,envMapIntensity:1})); lower.position.y=.34; car.add(lower);
const body=new THREE.Mesh(new THREE.BoxGeometry(2.0,0.44,4.2),paint); body.position.y=.62; car.add(body);
const hood=new THREE.Mesh(new THREE.BoxGeometry(1.86,0.28,1.5),paint); hood.position.set(0,.84,-1.25); car.add(hood);
const rear=new THREE.Mesh(new THREE.BoxGeometry(2.0,0.5,0.5),paint); rear.position.set(0,.78,1.9); car.add(rear);
const cabin=new THREE.Mesh(new THREE.BoxGeometry(1.64,0.46,1.9),paint); cabin.position.set(0,1.0,.05); car.add(cabin);
const glassMat=new THREE.MeshStandardMaterial({color:0x0a0e18,roughness:.04,metalness:1,envMapIntensity:2.2});
const rearGlass=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.42,0.1),glassMat); rearGlass.position.set(0,1.04,0.98); rearGlass.rotation.x=-0.35; car.add(rearGlass);
const roof=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.07,1.3),glassMat); roof.position.set(0,1.25,.1); car.add(roof);
const wingMat=new THREE.MeshStandardMaterial({color:0x0d0d0d,roughness:.4,metalness:.5,envMapIntensity:1});
const wing=new THREE.Mesh(new THREE.BoxGeometry(2.1,0.1,0.6),wingMat); wing.position.set(0,1.3,1.95); car.add(wing);
for(const x of [-0.85,0.85]){ const pp=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.32,0.1),wingMat); pp.position.set(x,1.12,1.95); car.add(pp); }
const tl=new THREE.Mesh(new THREE.BoxGeometry(1.86,0.15,0.08),new THREE.MeshBasicMaterial({color:0xff2a2a})); tl.position.set(0,0.76,2.12); car.add(tl);
const brakeGlow=new THREE.PointLight(0xff2222,2.6,24); brakeGlow.position.set(0,1.0,6); scene.add(brakeGlow);
const diff=new THREE.Mesh(new THREE.BoxGeometry(1.86,0.28,0.28),new THREE.MeshStandardMaterial({color:0x08080a,roughness:.8})); diff.position.set(0,0.34,2.05); car.add(diff);
// wheels (spin) — chrome rims
const wheels=[]; const wg=new THREE.CylinderGeometry(0.46,0.46,0.34,20); const wm=new THREE.MeshStandardMaterial({color:0x08080a,roughness:.85});
for(const x of [-0.98,0.98])for(const z of [-1.35,1.4]){ const wgrp=new THREE.Group(); const w=new THREE.Mesh(wg,wm); w.rotation.z=Math.PI/2; wgrp.add(w); const rim=new THREE.Mesh(new THREE.TorusGeometry(0.27,0.05,8,18),new THREE.MeshStandardMaterial({color:0xcfd6e0,roughness:.18,metalness:1,envMapIntensity:1.6})); rim.rotation.y=Math.PI/2; wgrp.add(rim); wgrp.position.set(x,0.44,z); car.add(wgrp); wheels.push(w); wheels.push(rim); }
const under=new THREE.Mesh(new THREE.PlaneGeometry(2.6,4.8),new THREE.MeshBasicMaterial({color:0x22d3ee,transparent:true,opacity:.28})); under.rotation.x=-Math.PI/2; under.position.y=.05; car.add(under);
const flames=[]; for(const x of [-0.5,0.5]){ const f=new THREE.Mesh(new THREE.ConeGeometry(0.19,1.1,10),new THREE.MeshBasicMaterial({color:0x66d8ff,transparent:true,opacity:.9})); f.rotation.x=-Math.PI/2; f.position.set(x,0.5,2.35); car.add(f); flames.push(f); }
scene.add(car);
const hlight=new THREE.SpotLight(0xfff2cc,120,120,0.5,0.5,1.3); hlight.position.set(0,1.5,-1.2); hlight.target.position.set(0,0,-46); scene.add(hlight); scene.add(hlight.target);

/* bloom */
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.5,0.55,0.85); composer.addPass(bloom);
composer.addPass(new OutputPass());

let speed=0,targetSpeed=6,shake=0; const clock=new THREE.Clock();
function resize(){ renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
addEventListener("resize",resize); resize();
function frame(){ requestAnimationFrame(frame);
  const dt=Math.min(clock.getDelta(),0.05); speed+=(targetSpeed-speed)*Math.min(1,dt*2.6); const mv=speed*dt;
  for(const m of movers){ m.position.z+=mv; if(m.position.z>13) m.position.z+=m.userData.wrap; }
  const t=performance.now()/1000;
  for(const w of wheels) w.rotation.x -= speed*dt*0.5;
  const boost=Math.min(1,speed/70); flames.forEach((f,i)=>{ f.visible=speed>14; f.scale.set(1,boost*(1.1+Math.sin(t*30+i)*0.3),1); f.material.opacity=0.5+boost*0.5; });
  under.material.opacity=0.2+boost*0.3;
  car.position.y=Math.sin(t*9)*0.02*(speed>10?1:.3); car.rotation.z=Math.sin(t*1.2)*0.012*(speed/40); car.position.x=Math.sin(t*0.6)*0.22*(speed/55);
  camera.position.x=car.position.x*0.7;
  const fov=64+Math.min(20,speed*0.18); camera.fov+=(fov-camera.fov)*0.1; camera.updateProjectionMatrix();
  if(shake>0){ camera.position.x+=(Math.random()-.5)*shake; camera.position.y=2.9+(Math.random()-.5)*shake; shake*=0.9; if(shake<0.01)shake=0; } else camera.position.y+=(2.9-camera.position.y)*0.1;
  camera.lookAt(car.position.x,0.85,-9); composer.render(); }
frame();
const setSpeedHud=(m)=>{ $("spd").textContent=Math.max(0,Math.round(60+(m-1)*90)); };

/* ================= RGS (crash engine · gameId pulse) ================= */
const RGS=new URLSearchParams(location.search).get("rgs")||`${location.protocol==="https:"?"wss":"ws"}://${location.host}/ws`;
const GAME=new URLSearchParams(location.search).get("game")||"pulse";
const MINOR=100; const fmt=(m)=>(m/MINOR).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const randHex=(n)=>{const b=new Uint8Array(n);crypto.getRandomValues(b);return [...b].map(x=>x.toString(16).padStart(2,"0")).join("")};
let ws,gphase="connecting",myBet=null,placing=false,hist=[],tOpen=0,betMs=4000,countRAF=0;

function stateChip(txt,cls){ const el=$("state"); el.textContent=txt; el.className="chip"+(cls?" "+cls:""); }
function buttons(){ $("btnBet").disabled=!(gphase==="betting"&&!myBet&&!placing);
  const canCash=gphase==="running"&&myBet&&!myBet.cashed; $("btnCash").disabled=!canCash;
  $("bet").disabled=!(gphase==="betting"&&!myBet); $("auto").disabled=!(gphase==="betting"&&!myBet); }
const curStake=()=>Math.round(parseFloat($("bet").value||"0")*MINOR);
const autoVal=()=>{const v=parseFloat($("auto").value||"0");return v>=1.01?v:undefined;};
function flash(c){ const f=$("flash"); f.style.background=c; f.style.opacity=".5"; setTimeout(()=>f.style.opacity="0",130); }
function renderHist(){ $("hist").innerHTML=hist.slice(0,14).map(x=>{const c=x>=10?"mega":x>=2?"hi":x>=1.5?"mid":"";return `<span class="pill ${c}">${x.toFixed(2)}×</span>`;}).join(""); }
function startCountdown(){ cancelAnimationFrame(countRAF); const bar=$("countbar"); const t0=performance.now();
  (function tick(){ const el=Math.min(1,(performance.now()-t0)/betMs); bar.style.width=(100*(1-el))+"%"; if(el<1&&gphase==="betting") countRAF=requestAnimationFrame(tick); })(); }
function setCash(){ if(gphase==="running"&&myBet&&!myBet.cashed){ $("cashamt").textContent=fmt(Math.floor(myBet.stake*curMult)); $("cashsub").textContent="CASH OUT · "+curMult.toFixed(2)+"×"; } }
let curMult=1;

function connect(){ ws=new WebSocket(RGS);
  ws.onopen=()=>ws.send(JSON.stringify({type:"hello",sessionToken:"overdrive-"+randHex(3),mode:"demo",gameId:GAME}));
  ws.onclose=()=>{ stateChip("reconnecting…"); gphase="connecting"; targetSpeed=6; buttons(); setTimeout(()=>{if(gphase==="connecting")connect();},1500); };
  ws.onerror=()=>stateChip("server unreachable"); ws.onmessage=(ev)=>handle(JSON.parse(ev.data)); }
function handle(m){ switch(m.type){
  case "welcome": $("bal").textContent=fmt(m.balance); gphase="between"; stateChip("waiting"); targetSpeed=6; buttons(); break;
  case "round_open":
    myBet=null; placing=false; gphase="betting"; targetSpeed=8; curMult=1; tOpen=performance.now();
    $("big").className="big"; $("big").style.color=""; $("big").textContent="1.00×"; $("sub").textContent="place your bet — launch incoming"; setSpeedHud(1);
    $("cashamt").textContent="Cash out"; $("cashsub").textContent="tap to bank";
    $("fair").innerHTML=`DOWNTOWN · fair commit <b>${m.round.commitment.slice(0,14)}…</b>`;
    stateChip("place bets","bet"); startCountdown(); buttons(); break;
  case "bet_accepted": myBet={betId:m.betId,stake:m.stake,cashed:false}; placing=false; $("bal").textContent=fmt(m.balance); $("sub").textContent="you're in — hold for launch"; buttons(); break;
  case "betting_closed": gphase="running"; betMs=Math.max(1500,performance.now()-tOpen); $("countbar").style.width="0%";
    $("big").className="big run"; $("sub").textContent=myBet?"GO — cash out before it seals":"in flight · bet on the next run"; stateChip("in flight","live"); buttons(); break;
  case "tick": curMult=m.multiplier; $("big").textContent=m.multiplier.toFixed(2)+"×"; setSpeedHud(m.multiplier); targetSpeed=20+(m.multiplier-1)*27; setCash(); break;
  case "cash_out": if(myBet&&m.betId===myBet.betId)myBet.cashed=true; $("bal").textContent=fmt(m.balance);
    $("big").className="big"; $("big").style.color="var(--green)"; $("sub").textContent=`escaped 🏁 ${m.multiplier.toFixed(2)}× · +${fmt(m.payout)}`;
    $("cashamt").textContent="+"+fmt(m.payout); $("cashsub").textContent="banked ✓"; flash("rgba(43,255,136,.4)"); buttons(); break;
  case "jackpot": $("bal").textContent=fmt(m.balance); break;
  case "crash":{ gphase="between"; const r=m.round; targetSpeed=0; shake=0.6; flash("rgba(255,50,50,.5)");
    hist.unshift(r.crashPoint); renderHist();
    $("big").className="big bust"; $("big").textContent=r.crashPoint.toFixed(2)+"×"; setSpeedHud(1);
    $("sub").textContent=(myBet&&!myBet.cashed)?`WALL SEALED at ${r.crashPoint.toFixed(2)}× — wrecked`:`sealed at ${r.crashPoint.toFixed(2)}×`;
    $("fair").innerHTML=`revealed <b>${r.serverSeed.slice(0,14)}…</b> · crash <b>${r.crashPoint.toFixed(2)}×</b> · <span class="ok">✓ verifiable</span>`;
    stateChip("crashed","bust"); if(!myBet||myBet.cashed){ $("cashamt").textContent="Cash out"; $("cashsub").textContent="tap to bank"; } myBet=null; buttons(); break; }
  case "balance": $("bal").textContent=fmt(m.balance); break;
  case "error": stateChip("⚠ "+m.code); placing=false; buttons(); break; } }

$("btnBet").onclick=()=>{ const s=curStake(); if(!(s>0))return; placing=true; buttons(); ws.send(JSON.stringify({type:"place_bet",stake:s,autoCashOut:autoVal(),clientEntropy:randHex(16)})); };
$("btnCash").onclick=()=>{ if(myBet&&!myBet.cashed) ws.send(JSON.stringify({type:"cash_out",betId:myBet.betId})); };
document.querySelectorAll(".chipbtn").forEach(b=>b.onclick=()=>{ const c=b.dataset.chip, v=parseFloat($("bet").value||"0");
  if(c==="half")$("bet").value=Math.max(1,Math.floor(v/2)); else if(c==="dbl")$("bet").value=Math.max(1,Math.floor(v*2)); else $("bet").value=Math.floor(v+ +c); });
connect();
</script>
</body>
</html>
