<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Ascent — pump &amp; rug</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --pink:#FF2E97;--cyan:#22D3EE;--green:#2BFF88;--gold:#FFD23F;--orange:#FF9F1C;--rug:#FF3653;
    --bg:#160833;--text:#fff;--muted:#B9A9E0;
    --display:'Fredoka',system-ui,sans-serif;--mono:'Space Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(circle at 12% 18%, rgba(255,46,151,.22), transparent 42%),
      radial-gradient(circle at 88% 12%, rgba(34,211,238,.20), transparent 42%),
      radial-gradient(circle at 50% 96%, rgba(255,210,63,.16), transparent 48%),
      var(--bg);
    background-attachment:fixed;
    color:#fff;font-family:var(--display);display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:18px;-webkit-font-smoothing:antialiased;overflow-x:hidden;touch-action:manipulation}
  .app{width:100%;max-width:860px}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;flex-wrap:wrap}
  .logo{font-weight:700;font-size:28px;letter-spacing:-.5px;background:linear-gradient(90deg,var(--cyan),var(--pink) 60%,var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .logo .dot{-webkit-text-fill-color:var(--pink)}
  .right{display:flex;align-items:center;gap:14px}
  .balance{font-family:var(--mono);font-size:14px;color:var(--gold)}.balance b{color:#fff}
  .sound,.info-btn{cursor:pointer;font-size:18px;user-select:none;opacity:.85}
  .info-btn{font-size:15px;border:1px solid rgba(255,255,255,.25);border-radius:50%;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center}

  .pool{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;padding:9px 14px;border-radius:14px;
    background:linear-gradient(90deg,rgba(255,46,151,.18),rgba(255,210,63,.18),rgba(34,211,238,.18));
    border:1px solid rgba(255,210,63,.35);font-family:var(--mono);font-size:14px;color:var(--muted);
    box-shadow:0 0 24px rgba(255,210,63,.12)}
  .pool .lbl{letter-spacing:1px}
  .pool b{font-family:var(--display);font-size:22px;color:var(--gold);text-shadow:0 0 16px rgba(255,210,63,.6)}
  .pool .amt{transition:transform .15s}.pool .amt.bump{transform:scale(1.12)}

  .stage{position:relative;border-radius:20px;overflow:hidden;height:380px;box-shadow:0 20px 70px rgba(255,46,151,.35),0 0 0 1px rgba(255,255,255,.10),inset 0 0 60px rgba(34,211,238,.08)}
  #stage canvas{display:block;width:100%!important;height:100%!important}
  .shake{animation:shk .4s cubic-bezier(.36,.07,.19,.97)}
  @keyframes shk{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-8px)}40%,60%{transform:translateX(8px)}}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;text-shadow:0 2px 20px rgba(0,0,0,.4)}
  .ticker{font-family:var(--mono);font-size:13px;letter-spacing:1px;opacity:.9;margin-bottom:2px}
  .mult{font-weight:700;font-size:100px;line-height:1;letter-spacing:-3px;transition:transform .08s;text-shadow:0 0 22px currentColor,0 0 50px currentColor}
  .mult.pop{transform:scale(1.06)}
  .msg{font-family:var(--mono);font-size:14px;margin-top:8px;height:18px;letter-spacing:.5px;opacity:.95}
  .bigwin{position:absolute;font-weight:700;font-size:44px;opacity:0}
  .bigwin.gold{color:var(--gold);text-shadow:0 0 30px rgba(255,210,63,.8)}
  .bigwin.moon{color:#fff;text-shadow:0 0 40px rgba(255,210,63,1)}
  .bigwin.show{animation:bw 1.8s ease-out forwards}
  @keyframes bw{0%{opacity:0;transform:scale(.4)}18%{opacity:1;transform:scale(1.2)}32%{transform:scale(1)}82%{opacity:1}100%{opacity:0;transform:scale(1.05) translateY(-22px)}}
  .feed{position:absolute;top:12px;right:12px;width:158px;font-family:var(--mono);font-size:11px;display:flex;flex-direction:column;gap:4px;pointer-events:none}
  .feed .f{display:flex;justify-content:space-between;background:rgba(0,0,0,.28);border-radius:7px;padding:4px 8px;backdrop-filter:blur(4px);animation:fin .3s ease-out}
  .feed .f .m{color:var(--green);font-weight:700}
  @keyframes fin{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
  .fair{position:absolute;bottom:10px;left:12px;font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.55);max-width:70%}.fair b{color:var(--cyan)}

  .history{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap;min-height:26px}
  .chip{font-family:var(--mono);font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}
  .chip.lo{background:rgba(255,54,83,.16);color:#FF7088}.chip.mid{background:rgba(255,210,63,.16);color:var(--gold)}.chip.hi{background:rgba(43,255,136,.16);color:var(--green)}

  .controls{display:grid;grid-template-columns:1fr 1fr 1.5fr;gap:11px}
  @media(max-width:600px){.controls{grid-template-columns:1fr 1fr}.action{grid-column:1/-1}}
  .field{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:11px 14px}
  .field label{display:block;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
  .field .row{display:flex;align-items:center;gap:8px}
  .field input{background:transparent;border:none;color:#fff;font-family:var(--mono);font-weight:700;font-size:20px;width:100%;outline:none}
  .field input::-webkit-inner-spin-button{-webkit-appearance:none}
  .mini{font-family:var(--mono);font-size:11px;color:var(--muted);background:rgba(255,255,255,.07);border-radius:7px;padding:5px 8px;cursor:pointer;user-select:none}
  .mini:hover{color:#fff;background:rgba(255,255,255,.14)}
  .action button{width:100%;height:100%;min-height:66px;border:none;border-radius:14px;cursor:pointer;font-family:var(--display);font-weight:700;font-size:21px;color:#1a0833;transition:transform .05s,filter .15s}
  .action button:active{transform:scale(.98)}
  .btn-buy{background:linear-gradient(135deg,var(--cyan),var(--green));box-shadow:0 8px 26px rgba(43,255,136,.4)}
  .btn-sell{background:linear-gradient(135deg,var(--gold),var(--orange));box-shadow:0 8px 26px rgba(255,159,28,.45);color:#2a1500}
  .btn-wait{background:rgba(255,255,255,.08);color:var(--muted);cursor:not-allowed;box-shadow:none}
  .btn-sell .sub{display:block;font-family:var(--mono);font-size:12px;font-weight:400;margin-top:2px;opacity:.9}
  footer{margin-top:14px;font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;line-height:1.6}

  .modal{position:fixed;inset:0;background:rgba(8,3,20,.78);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal.open{display:flex}
  .modal .card{background:#1d0f3d;border:1px solid rgba(255,255,255,.12);border-radius:18px;max-width:460px;width:100%;padding:22px 24px;max-height:86vh;overflow:auto}
  .modal h2{font-size:20px;margin-bottom:12px}
  .modal h3{font-size:14px;margin:14px 0 6px;color:var(--gold);font-family:var(--mono);letter-spacing:.5px}
  .modal p,.modal li{font-family:var(--mono);font-size:12px;line-height:1.6;color:var(--muted)}
  .modal li{margin-left:16px}
  .modal .close{float:right;cursor:pointer;font-size:18px;color:var(--muted)}
  .modal b{color:#fff}
  .modal code{color:var(--cyan);font-size:11px;word-break:break-all}
</style>
  <script type="module" crossorigin src="/ascent/assets/index-BfxSw0S1.js"></script>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Ascent<span class="dot">.</span></div>
    <div class="right">
      <span class="info-btn" id="info-btn" title="fairness &amp; rules">i</span>
      <span class="sound" id="sound">🔊</span>
      <div class="balance"><b id="bal">0.00</b> credits</div>
    </div>
  </header>

  <div class="pool">
    <span class="lbl">🌙 MOON POOL</span>
    <b class="amt" id="pool">0.00</b>
    <span class="lbl" style="font-size:11px">drops randomly to anyone in a round</span>
  </div>

  <div class="stage" id="stage">
    <div class="feed" id="feed"></div>
    <div class="fair">fair commit <b id="hash">—</b></div>
    <div class="overlay">
      <div class="ticker" id="ticker">tap launch to start the pump</div>
      <div class="mult" id="mult">1.00&times;</div>
      <div class="msg" id="msg">set your buy &amp; ride the pump</div>
      <div class="bigwin" id="bigwin"></div>
    </div>
  </div>

  <div class="history" id="history"></div>

  <div class="controls">
    <div class="field"><label>buy amount</label><div class="row"><input id="bet" type="number" value="10" min="1" step="1" inputmode="decimal"><span class="mini" data-act="half">½</span><span class="mini" data-act="double">2×</span></div></div>
    <div class="field"><label>auto-sell at</label><div class="row"><input id="auto" type="number" value="2.00" min="1.01" step="0.1" inputmode="decimal"><span class="mini">×</span></div></div>
    <div class="action"><button id="action" class="btn-buy">Buy in &amp; launch 🚀</button></div>
  </div>

  <footer id="footer"></footer>
</div>

<div class="modal" id="modal">
  <div class="card">
    <span class="close" id="modal-close">✕</span>
    <h2>How Ascent works</h2>
    <div id="modal-body"></div>
  </div>
</div>

</body>
</html>
